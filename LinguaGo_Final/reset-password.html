<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer Contraseña - LinguaGo</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
</head>
<body class="linguago-reset-body">
  <header class="linguago-header">
    <button class="linguago-menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
  </header>

  <main class="linguago-reset-container">
    <!-- Ilustración lateral -->
    <div class="linguago-reset-image">
      <img src="assets/img/CyberEye.png" alt="Seguridad" class="reset-eye" />
    </div>

    <!-- Formulario de nueva contraseña -->
    <div class="linguago-reset-form">
      <form id="resetForm">
        <h2>Nueva contraseña</h2>
        <p>Tu nueva contraseña debe ser diferente a la anterior y tener al menos 8 caracteres.</p>

        <label for="password"><i class="fas fa-lock"></i> Nueva contraseña</label>
        <input type="password" id="password" name="password" placeholder="********" required>

        <label for="confirmPassword"><i class="fas fa-lock"></i> Confirmar contraseña</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="********" required>

        <button type="submit" class="btn-primary">Reiniciar Contraseña</button>

        <div class="linguago-reset-links">
          <a href="register.html">Regresar a Registro</a>
        </div>
      </form>
    </div>
  <!-- Imagen derecha -->
    <div class="lg-login-illustration">
      <img src="assets/img/blog-cultura - Edited.png" alt="LinguaGo Login">
      <div class="lg-login-logo">
        <img src="assets/img/LinguaGo logo - Edited.png" alt="LinguaGo Logo">
        </div>
    </div>

  </main>

  <!-- Footer -->
  <footer class="lg-footer">
    <p class="lg-footer-copy">&copy; 2025. UNCSM</p>
    <div class="lg-footer-socials">
      <a href="#"><i class="fab fa-facebook"></i></a>
      <a href="#"><i class="fab fa-twitter"></i></a>
      <a href="#"><i class="fab fa-instagram"></i></a>
    </div>
  </footer>

  <script src="js/core.js"></script>
  <script src="js/reset.js"></script>

  <!-- Contenedor global de notificaciones -->
<div id="toast-container" class="linguago-toast-container"></div>

</body>
</html>
