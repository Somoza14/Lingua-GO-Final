<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>LinguaGo | Crear cuenta</title>

  <!-- Fuentes locales -->
  <link rel="stylesheet" href="assets/fonts/googlefonts/montserrat.css">
  <link rel="stylesheet" href="assets/fonts/googlefonts/rubik.css">

  <!-- Font Awesome local -->
  <link rel="stylesheet" href="assets/fonts/fontawesome/css/all.min.css">

  <!-- Estilos principales -->
  <link rel="stylesheet" href="styles.css">

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body class="lg-register-body">

  <!-- Header -->
  <header class="lg-header">
    <button class="lg-hamburger" aria-label="Abrir menú" id="js-hamburger">
      <span class="lg-hamburger-line"></span>
      <span class="lg-hamburger-line"></span>
      <span class="lg-hamburger-line"></span>
    </button>

    <nav class="lg-nav-overlay" id="js-nav">
      <ul class="lg-nav-list">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="about.html">Acerca de</a></li>
        <li><a href="#">Cancelar</a></li>
      </ul>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="lg-register-main">

    <!-- Imagen izquierda -->
    <div class="lg-register-image">
      <img src="assets/img/different-language-speech-bubble-hello-concept-scaled.jpg" alt="Aprendiz de idiomas">
    </div>

    <!-- Formulario -->
    <section class="lg-register-card">
      <h2 class="lg-register-title">Crea tu cuenta</h2>

      <!-- Google Login -->
      <div id="g_id_onload" data-client_id="1020252781524-ofd58tkv7rpuvles3odrlb3mltjpgrgb.apps.googleusercontent.com"
        data-callback="handleGoogleCredential" data-auto_prompt="false">
      </div>
      <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="signup_with"
        data-shape="rectangular" data-logo_alignment="left" data-width="100%">
      </div>

      <div class="lg-divider-line">ó</div>

      <form id="registerForm" class="lg-register-form">
        <label for="name">Nombre completo</label>
        <div class="lg-input-group">
          <i class="fas fa-user"></i>
          <input type="text" id="name" placeholder="Tu nombre" required>
        </div>

        <label for="email">Dirección de correo</label>
        <div class="lg-input-group">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" placeholder="correo@direccion.com" required>
        </div>

        <label for="password">Contraseña</label>
        <div class="lg-input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="********" required>
          <i class="fas fa-eye lg-toggle-pass" id="togglePass"></i>
        </div>

        <div class="lg-checkbox">
          <input type="checkbox" id="news">
          <label for="news">Recibe noticias, novedades y ofertas.</label>
        </div>

        <button type="submit" class="lg-register-btn">Crear cuenta</button>

        <p class="lg-register-info">
          Al crear una cuenta aceptas los <a href="#">Términos de Servicio</a> y nuestra <a href="#">Política de
            Privacidad</a>.
        </p>

        <p class="lg-register-text">
          ¿Ya tienes una cuenta? <a href="login.html">Ingresa aquí</a>
        </p>
      </form>
    </section>

    <!-- Imagen derecha -->
    <div class="lg-register-illustration">
      <img src="assets/img/schola-idiomas-aprender-idiomas-vida-laboral - Edited.png" alt="LinguaGo Registro">
      <div class="lg-register-logo">
        <img src="assets/img/LinguaGo logo - Edited.png" alt="LinguaGo Logo">
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="lg-footer">
    <p class="lg-footer-copy">&copy; 2025. UNCSM</p>
    <div class="lg-footer-socials">
      <a href="#"><i class="fab fa-facebook"></i></a>
      <a href="#"><i class="fab fa-twitter"></i></a>
      <a href="#"><i class="fab fa-instagram"></i></a>
    </div>
  </footer>

  <script src="js/core.js"></script>
  <script src="js/register.js"></script>

  <!-- Contenedor global de notificaciones -->
  <div id="toast-container" class="linguago-toast-container"></div>

</body>

</html>
