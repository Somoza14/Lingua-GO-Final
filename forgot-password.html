<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña - LinguaGo</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="assets/fonts/fontawesome/css/all.min.css">
</head>

<body class="linguago-forgot-body">

  <!-- Header -->
  <header class="lg-header">
    <button class="lg-hamburger" aria-label="Abrir menú" id="js-hamburger">
      <span class="lg-hamburger-line"></span>
      <span class="lg-hamburger-line"></span>
      <span class="lg-hamburger-line"></span>
    </button>

    <nav class="lg-nav-overlay" id="js-nav">
      <ul class="lg-nav-list">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="about.html">Sobre Nosotros</a></li>
        <li><a href="#">Cancelar</a></li>
      </ul>
    </nav>
  </header>

  <main class="linguago-forgot-container">
    <!-- Imagen lateral -->
    <div class="linguago-forgot-image">
      <img src="assets/img/Olvido.jpg" alt="Recuperar contraseña" />
      <div class="linguago-color-options"></div>
    </div>

    <!-- Formulario de recuperación -->
    <div class="linguago-forgot-form">
      <form id="forgotForm">
        <h2>¿Olvidaste tu contraseña?</h2>
        <p>Escribe tu correo y te enviaremos un enlace para restablecerla.</p>

        <label for="email"><i class="fas fa-envelope"></i> Dirección de correo</label>
        <input type="email" id="email" name="email" placeholder="correo@direccion.com" required>

        <button type="submit" class="btn-primary">Reiniciar Contraseña</button>

        <div class="linguago-forgot-links">
          <a href="register.html">Regresar a Registro</a>
        </div>
      </form>
    </div>

    <!-- Imagen derecha -->
    <div class="lg-login-illustration">
      <img src="assets/img/blog-cultura - Edited.png" alt="LinguaGo Login">
      <div class="lg-login-logo">
        <img src="assets/img/LinguaGo logo - Edited.png" alt="LinguaGo Logo">
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="lg-footer">
    <p class="lg-footer-copy">&copy; 2026. UNCSM</p>
    <div class="lg-footer-socials">
      <a href="#"><i class="fab fa-facebook"></i></a>
      <a href="#"><i class="fab fa-twitter"></i></a>
      <a href="#"><i class="fab fa-instagram"></i></a>
    </div>
  </footer>

  <script src="js/core.js"></script>
  <script src="js/forgot.js"></script>

  <!-- Contenedor global de notificaciones -->
  <div id="toast-container" class="linguago-toast-container"></div>

</body>

</html>
